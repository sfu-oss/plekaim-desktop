name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Ensure draft release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" --draft --title "$TAG"

  build-mac:
    needs: [prepare-release]
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install root deps
        run: npm install
      - name: Install renderer deps
        run: cd renderer && npm install
      - name: Setup native solver (Eigen + build)
        run: |
          cd native-solver
          bash setup-eigen.sh
          npm install
          npm run build
      - name: Build renderer + fix paths
        run: cd renderer && npm run build && cd .. && node scripts/fix-paths.js
      - name: Build & publish DMG
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --mac --arm64 --x64 --publish always

  build-windows:
    needs: [prepare-release]
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install root deps
        run: npm install
      - name: Install renderer deps
        run: cd renderer && npm install
      - name: Setup native solver (Eigen + build)
        shell: bash
        run: |
          cd native-solver
          bash setup-eigen.sh
          npm install
          npm run build
      - name: Build renderer + fix paths
        run: cd renderer && npm run build && cd .. && node scripts/fix-paths.js
      - name: Build & publish NSIS
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --x64 --publish always

  publish:
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Publish release (remove draft)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          gh release edit "$TAG" --draft=false --latest
