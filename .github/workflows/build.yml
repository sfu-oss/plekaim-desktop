name: Build Installers

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install root deps
        run: npm install
      - name: Install renderer deps
        run: cd renderer && npm install
      - name: Build renderer
        run: cd renderer && npm run build
      - name: Build DMG
        run: npx electron-builder --mac --arm64 --x64
      - uses: actions/upload-artifact@v4
        with:
          name: mac-installers
          path: dist/*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install root deps
        run: npm install
      - name: Install renderer deps
        run: cd renderer && npm install
      - name: Build renderer
        run: cd renderer && npm run build
      - name: Build NSIS
        run: npx electron-builder --win --x64
      - uses: actions/upload-artifact@v4
        with:
          name: win-installers
          path: dist/*.exe

  release:
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            mac-installers/*.dmg
            win-installers/*.exe
          draft: true
