name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install root deps
        run: npm install
      - name: Install renderer deps
        run: cd renderer && npm install
      - name: Build renderer + fix paths
        run: cd renderer && npm run build && cd .. && node scripts/fix-paths.js
      - name: Build & publish DMG
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --mac --arm64 --x64 --publish always

  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install root deps
        run: npm install
      - name: Install renderer deps
        run: cd renderer && npm install
      - name: Build renderer + fix paths
        run: cd renderer && npm run build && cd .. && node scripts/fix-paths.js
      - name: Build & publish NSIS
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --x64 --publish always
